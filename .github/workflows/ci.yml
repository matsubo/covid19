name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type / Lint / Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Astro check (type)
        run: bun run astro check

      - name: Lint (biome)
        run: bun run lint

      - name: Unit tests (vitest)
        run: bun run test

  build:
    name: Build (smoke)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Astro content layer
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-cache-${{ hashFiles('src/content/**', 'astro.config.mjs') }}
          restore-keys: astro-cache-

      - name: Build
        run: bun run build

      - name: Verify pagefind index
        run: test -f dist/pagefind/pagefind.js && echo "pagefind OK"

      - name: Upload build artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-debug
          path: dist
          retention-days: 3
